# Sprino web — nginx config for the self-host bundle.
#
# Serves the Vite build output from /usr/share/nginx/html and reverse-
# proxies /api/* and /mcp/* to the backend service. SSE compatibility:
# proxy_buffering off + HTTP/1.1 + extended read timeouts so long-lived
# event streams don't get cut off.

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any non-asset path serves index.html so client routing
    # works after deep-links / refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + MCP — pass through to the Hono server.
    location ~ ^/(api|mcp)(/|$) {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: don't buffer, don't time out long-lived connections.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        chunked_transfer_encoding on;
    }

    # Tiny healthcheck the compose healthcheck can hit without bothering
    # the backend.
    location = /web-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
