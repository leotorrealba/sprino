# Sprino — Docker Compose
#
# Profiles:
#   - default (no profile): Postgres only, for local dev. Run alongside
#     `bun --filter '@sprino/server' dev` on the host.
#   - "full": Postgres + server + web + backup sidecar. For phase 7
#     self-host validation. The backup sidecar is intentionally bundled
#     into `full` so a self-hosted deploy gets nightly backups by default
#     — operators who want to opt out can pass `--scale backup=0`.
#   - "backup": just the backup sidecar (combine with default to attach
#     it to a Postgres-only stack: `docker compose --profile backup up -d`).
#
# Backups are off by default in plain `docker compose up -d` to keep dev
# lightweight; they only run when one of the two profiles above is active.
#
# Quick start (dev):    docker compose up -d
# Self-host (week 7):   docker compose --profile full up -d
# With backups:         docker compose --profile full --profile backup up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: sprino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sprino
      POSTGRES_PASSWORD: sprino
      POSTGRES_DB: sprino_dev
    ports:
      - "5433:5432"  # exposed on 5433 so it doesn't clash with brew postgresql@15 on 5432
    volumes:
      - sprino-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprino -d sprino_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: sprino-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sprino:sprino@postgres:5432/sprino_dev
      PORT: 3001
      NODE_ENV: production
      SPRINO_ACTORS_JSON: ${SPRINO_ACTORS_JSON}
      SPRINO_STREAM_SECRET: ${SPRINO_STREAM_SECRET}
      SPRINO_DEFAULT_PROJECT_SLUG: ${SPRINO_DEFAULT_PROJECT_SLUG:-sprino}
      SPRINO_DEFAULT_PROJECT_ID: ${SPRINO_DEFAULT_PROJECT_ID:-018c3e7a-0002-7000-8000-000000000001}
      SPRINO_DEFAULT_PROJECT_DISPLAY_NAME: ${SPRINO_DEFAULT_PROJECT_DISPLAY_NAME:-Sprino}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: sprino-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/web-healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6

  backup:
    profiles: ["backup", "full"]
    image: postgres:16-alpine
    container_name: sprino-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: sprino
      PGPASSWORD: sprino
      PGDATABASE: sprino_dev
      BACKUP_DIR: /backups
      BACKUP_RETENTION: ${BACKUP_RETENTION:-30}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-0}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./scripts/backup-entrypoint.sh:/usr/local/bin/backup-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup-entrypoint.sh"]

volumes:
  sprino-postgres-data:
