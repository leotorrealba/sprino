name: pr-title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      # amannn/action-semantic-pull-request v5.5.3
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
            security
            test
            release
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter and not end with a period.
