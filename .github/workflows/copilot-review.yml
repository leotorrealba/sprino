name: copilot-review

on:
  pull_request:
    types:
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  request:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot code review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-reviewer "copilot-pull-request-reviewer" || \
          echo "note: could not add Copilot reviewer (Copilot Code Review may not be enabled for this org/repo)"
