name: docker-smoke

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - 'bootstrap.sh'
      - 'scripts/smoke.sh'
      - 'apps/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - 'bootstrap.sh'
      - 'scripts/smoke.sh'

jobs:
  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - name: Run full-stack smoke test
        run: sh scripts/smoke.sh
        env:
          DOCKER_BUILDKIT: 1
