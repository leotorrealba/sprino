name: pr

# TypeScript PR checks with runtime-aware dependency install.
# Prefer Bun when a Bun lockfile exists (`bun.lock` / `bun.lockb`), because
# Bun workspaces can use `workspace:*` dependencies that npm cannot install.
# Fall back to npm for npm-managed repos. We deliberately do not enable
# setup-node's npm cache because it fails when no npm lockfile exists at the
# working directory.
#
# Monorepo tip: if your package.json lives in a subdirectory, add
# `defaults.run.working-directory: <subdir>` to each job, or set
# `working-directory` per step.

on:
  pull_request:
    branches: [main]

jobs:
  ts-typecheck:
    name: ts-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Typecheck
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun run typecheck || npx tsc --noEmit
          else
            npx tsc --noEmit
          fi

  ts-lint:
    name: ts-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Lint
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            if bun run | grep -Eq '^[[:space:]]*lint[[:space:]]'; then
              bun run lint
            else
              echo "No lint script found; passing ts-lint by policy."
            fi
          elif npm run | grep -Eq '^[[:space:]]*lint[[:space:]]'; then
            npm run lint
          else
            npx eslint .
          fi

  ts-test:
    name: ts-test
    runs-on: ubuntu-latest
    env:
      # DATABASE_URL is only used by the migrate step (creates tables).
      # The test runner sets its own DATABASE_URL + SPRINO_ACTORS_JSON via
      # apps/server/test/env-setup.ts, which is why we don't seed here.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprino_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprino_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sprino_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          path: sprino
      - name: Checkout tessera (sibling repo for conformance fixtures)
        uses: actions/checkout@v4
        with:
          repository: leotorrealba/tessera
          path: tessera
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: sprino
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Run database migrations
        working-directory: sprino
        run: bun run db:migrate
      - name: Test
        working-directory: sprino
        run: bun run test
