name: pr

# TypeScript PR checks with runtime-aware dependency install.
# Prefer Bun when a Bun lockfile exists (`bun.lock` / `bun.lockb`), because
# Bun workspaces can use `workspace:*` dependencies that npm cannot install.
# Fall back to npm for npm-managed repos. We deliberately do not enable
# setup-node's npm cache because it fails when no npm lockfile exists at the
# working directory.
#
# Monorepo tip: if your package.json lives in a subdirectory, add
# `defaults.run.working-directory: <subdir>` to each job, or set
# `working-directory` per step.

on:
  pull_request:
    branches: [main]

jobs:
  ts-typecheck:
    name: ts-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Typecheck
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun run typecheck || npx tsc --noEmit
          else
            npx tsc --noEmit
          fi

  ts-lint:
    name: ts-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Lint
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            if bun run | grep -Eq '^[[:space:]]*lint[[:space:]]'; then
              bun run lint
            else
              echo "No lint script found; passing ts-lint by policy."
            fi
          elif npm run | grep -Eq '^[[:space:]]*lint[[:space:]]'; then
            npm run lint
          else
            npx eslint .
          fi

  ts-test:
    name: ts-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Test
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun run test
          else
            npm test
          fi
