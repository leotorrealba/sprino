name: pr

# TypeScript PR checks with runtime-aware dependency install.
# Sprino uses Bun workspaces (`bun.lock` + workspace:* dependencies), so npm
# install is not reliable. We prefer Bun when a Bun lockfile exists, and fall
# back to npm for npm-managed repos.

on:
  pull_request:
    branches: [main]

jobs:
  ts-typecheck:
    name: ts-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Typecheck
        run: |
          bun run typecheck || npx tsc --noEmit

  ts-lint:
    name: ts-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Lint
        run: |
          if bun run | grep -Eq '^[[:space:]]*lint[[:space:]]'; then
            bun run lint
          elif npm run | grep -Eq '^[[:space:]]*lint[[:space:]]'; then
            npm run lint
          else
            echo "No lint script found; passing ts-lint by policy."
          fi

  ts-test:
    name: ts-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Test
        run: |
          bun run test || npm test
