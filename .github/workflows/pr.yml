name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate Conventional Commits PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
            test
            security
            release
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            PR title subject must start lowercase and not end with a period.

  ts-typecheck:
    name: ts-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  ts-test:
    name: ts-test
    runs-on: ubuntu-latest
    env:
      # DATABASE_URL is only used by the migrate step (creates tables).
      # The test runner sets its own DATABASE_URL + SPRINO_ACTORS_JSON via
      # apps/server/test/env-setup.ts, which is why we don't seed here.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprino_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprino_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sprino_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          path: sprino
      - name: Checkout tessera (sibling repo for conformance fixtures)
        uses: actions/checkout@v4
        with:
          repository: leotorrealba/tessera
          path: tessera
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: sprino
        run: bun install --frozen-lockfile
      - name: Run database migrations
        working-directory: sprino
        run: bun run db:migrate
      - name: Run tests
        working-directory: sprino
        run: bun run test
